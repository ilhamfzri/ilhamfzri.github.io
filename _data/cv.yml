- title: 🚀 Personal Projects
  type: time_table
  contents:
    - title: <a href="https://github.com/ilhamfzri/pendek.in-backend"> Pendek.In <a>
      description: A simple REST API for creating and customizing bio links (like linktree) with analytics features using Go. Implemented PostgreSQL as a database, Redis for caching, clean architecture (Controller -> Service -> Repository), and some twelve-factor methodology.
    - title: <a href="https://www.youtube.com/watch?v=oCVoU2aFNUI"> Cosmate (Paragon Hackaton Project) <a>
      description: An AI-based web app to find skin-tone colors and recommend the best color for makeup, also with a virtual try-on feature. I am Responsible as a Fullstack Developer and successfully built a web app for PoC in 24 hours based on idea creation. Implemented some machine learning algorithms, Flask for web framework and backend, bootstrap + javascript for front-end, and MongoDB for the database.
    - title: <a href="https://github.com/ilhamfzri/traffic-violation-detection">traffic-violation-detection</a>
      description: Traffic Violation Detection & Recognition is a system built to detect various traffic violations. Currently, this system only supports detecting running red light violations, helmet violations, and wrong-way. I used YOLOv5 for object detection and SORT as an object tracker. Implemented PyQT for GUI, machine learning frameworks (Pytorch), and various data structures and algorithms to make this possible.
    - title: <a href="https://github.com/ilhamfzri/CovaTech">CovaTech an android application for COVID-19 tracking.</a>
      description: A native android application that has a location tracking function that is visited and also an algorithm to provide notifications if the user has met someone who has Covid-19. Using android studio as IDE, Java as programming language, and Firebase for Authentification and Database..

